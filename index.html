<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TV PLAYER - TRẦN TẤT KHÔI</title>
    <style>
        /* Xóa bỏ khoảng trắng thừa của trình duyệt */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Không cho hiện thanh cuộn ngoài */
            background-color: #000;
        }

        /* Định dạng khung chứa giao diện ké */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Nút làm mới nhanh giao diện (đề phòng bị lag) */
        #refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 204, 0, 0.7);
            color: #000;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 999;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        #refresh-btn:hover {
            transform: rotate(180deg);
            background: rgba(255, 204, 0, 1);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <iframe 
            src="https://truyenhinhvn18h1.duckdns.org" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <button id="refresh-btn" onclick="location.reload()" title="Tải lại trang">
        ↻
    </button>

</body>
</html>

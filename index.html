    <style>
        :root { --primary: #ffcc00; --bg: #000; --side-width: 320px; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }

        /* Nút điều khiển */
        #menu-toggle, #full-page-btn, #settings-btn {
            position: absolute; top: 15px; z-index: 100;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 12px; cursor: pointer; border-radius: 5px; 
            transition: 0.3s ease;
        }
        #menu-toggle { left: 15px; font-size: 24px; }
        #settings-btn { left: 70px; font-size: 24px; }
        #full-page-btn { right: 15px; font-size: 14px; font-weight: bold; }

        #main-content { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; left: 0; width: var(--side-width); height: 100%;
            background: #111; z-index: 2000; transform: translateX(-100%);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid #333; 
            display: flex; flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.8); }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; z-index: 1500; 
        }
        #overlay.show { display: block; }

        /* CSS Bảng Cài Đặt */
        #settings-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: #1a1a1a; border-radius: 15px;
            padding: 20px; z-index: 2100; display: none; border: 1px solid #333;
        }
        .settings-header { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 20px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* CSS Nút Gạt (Switch) */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); background-color: #000; }

        /* Header Sidebar */
        .sidebar-header {
            display: flex; align-items: center; justify-content: center; padding: 20px 15px; 
            border-bottom: 1px solid #222; background: #1a1a1a;
        }
        .sidebar-header img { width: 35px; height: 35px; margin-right: 12px; object-fit: contain; }

        /* Tabs & List */
        .tabs { display: flex; overflow-x: auto; background: #1a1a1a; padding: 10px; border-bottom: 1px solid #333; scrollbar-width: none; gap: 5px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tabs button { background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 11px; flex-shrink: 0; }
        .tabs button.active { background: var(--primary); color: #000; font-weight: bold; }
        
        #list { flex: 1; overflow-y: auto; padding: 10px; }
        .item { display: flex; align-items: center; padding: 12px; background: #1a1a1a; margin-bottom: 8px; border-radius: 8px; cursor: pointer; border: 1px solid #222; }
        .item.active { border-color: var(--primary); background: rgba(255,204,0,0.1); }
        .item img { width: 45px; height: 30px; object-fit: contain; margin-right: 12px; background: #fff; border-radius: 4px; padding: 2px; }

        .ui-hidden { opacity: 0 !important; pointer-events: none; }
        .hide-cursor { cursor: none !important; }
    </style>
</head>

    function handleUI() {
        const els = [document.getElementById('video-controls'), document.getElementById('menu-toggle'), document.getElementById('full-page-btn')];
        els.forEach(el => el.classList.remove('ui-hidden'));
        document.body.classList.remove('hide-cursor');
        clearTimeout(hideTimeout);
        clearTimeout(cursorTimeout);
        hideTimeout = setTimeout(() => { if(!sidebar.classList.contains('open')) els.forEach(el => el.classList.add('ui-hidden')); }, 3000);
        cursorTimeout = setTimeout(() => { if(document.fullscreenElement) document.body.classList.add('hide-cursor'); }, 3000);
    }

    function toggleMenu() { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
    function toggleSettings() { 
        const isShow = settingsModal.style.display === 'block';
        settingsModal.style.display = isShow ? 'none' : 'block';
        overlay.classList.toggle('show', !isShow);
    }
    function closeAll() { sidebar.classList.remove('open'); overlay.classList.remove('show'); settingsModal.style.display = 'none'; }
    function toggleFullPage() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

    function toHex(val) {
        if (!val || val.length === 32) return val;
        try { return Array.from(atob(val.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0).toString(16).padStart(2,'0')).join(''); } catch(e) { return val; }
    }

    async function init() {
        shaka.polyfill.installAll();
        shakaPlayer = new shaka.Player();
        renderTabs(); renderList();
        if(FIXED_CHANNELS.length > 0) play(FIXED_CHANNELS[0]);
    }

    async function play(ch) {
        // Tắt hết các player phụ trước khi chuyển kênh
        if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        await shakaPlayer.detach(); 
        video.src = "";
        video.removeAttribute("src");
        video.load();

        const url = ch.u.toLowerCase();
        const isMpd = url.includes('.mpd') || (ch.i && ch.k);
        const isPhpOrM3u8 = url.includes('.php') || url.includes('.m3u8');

        if (isMpd) {
            // DÙNG SHAKA CHO MPD DRM
            let drmConfig = { clearKeys: {} };
            if (ch.i && ch.k) {
                drmConfig.clearKeys[toHex(ch.i)] = toHex(ch.k);
            }
            await shakaPlayer.attach(video);
            shakaPlayer.configure({ drm: drmConfig });
            try { await shakaPlayer.load(ch.u); } catch(e) {}
        } 
        else if (isPhpOrM3u8) {
            // DÙNG TRÌNH PHÁT GỐC CHO LINK PHP/M3U8 CỦA KHÔI
            console.log("Đang dùng trình phát gốc cho:", ch.n);
            video.src = ch.u;
            video.play().catch(() => {
                // Nếu trình phát gốc kén quá thì mới dùng Hls.js làm dự phòng
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls();
                    hlsPlayer.loadSource(ch.u);
                    hlsPlayer.attachMedia(video);
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                }
            });
        }

        renderList(ch.u);
        if(window.innerWidth < 800) sidebar.classList.remove('open');
    }

    function renderTabs() {
        document.getElementById('tab-box').innerHTML = GROUP_ORDER.map(g => 
            `<button class="${curTab === g ? 'active' : ''}" onclick="setTab('${g}', this)">${g === 'ALL' ? 'TẤT CẢ' : g}</button>`
        ).join('');
    }

    function renderList(activeUrl = "") {
        const box = document.getElementById('list');
        box.innerHTML = "";
        FIXED_CHANNELS.forEach(ch => {
            if (curTab !== 'ALL' && ch.g !== curTab) return;
            const div = document.createElement('div');
            div.className = `item ${ch.u === activeUrl ? 'active' : ''}`;
            div.innerHTML = `<img src="${ch.l}" onerror="this.src='https://via.placeholder.com/50?text=TV'"><span>${ch.n}</span>`;
            div.onclick = () => play(ch);
            box.appendChild(div);
        });
    }

    function setTab(t, btn) { curTab = t; renderTabs(); renderList(); }

    init();
</script>

    const GROUP_ORDER = ["ALL", "VTV", "THIẾT YẾU", "VTVCAB", "HTV", "SCTV", "ĐỊA PHƯƠNG", "QUỐC TẾ"];

    function handleUI() {
        const els = [document.getElementById('video-controls'), document.getElementById('menu-toggle'), document.getElementById('full-page-btn')];
        els.forEach(el => el.classList.remove('ui-hidden'));
        document.body.classList.remove('hide-cursor');
        clearTimeout(hideTimeout);
        clearTimeout(cursorTimeout);
        hideTimeout = setTimeout(() => { if(!sidebar.classList.contains('open')) els.forEach(el => el.classList.add('ui-hidden')); }, 3000);
        cursorTimeout = setTimeout(() => { if(document.fullscreenElement) document.body.classList.add('hide-cursor'); }, 3000);
    }

    function toggleMenu() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    function closeAll() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    function toggleSettings() { alert("Cài đặt đang được cập nhật..."); }
    function toggleFullPage() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

    function toHex(val) {
        if (!val || val.length === 32) return val;
        try { return Array.from(atob(val.replace(/-/g,'+').replace(/_/g,'/')), c => c.charCodeAt(0).toString(16).padStart(2,'0')).join(''); } catch(e) { return val; }
    }

    async function init() {
        shaka.polyfill.installAll();
        shakaPlayer = new shaka.Player();
        renderTabs(); renderList();
        if(FIXED_CHANNELS.length > 0) play(FIXED_CHANNELS[0]);
    }

    async function play(ch) {
        // Tắt hết các player phụ trước khi chuyển kênh
        if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
        await shakaPlayer.detach(); 
        video.src = "";
        video.removeAttribute("src");
        video.load();

        const url = ch.u.toLowerCase();
        const isMpd = url.includes('.mpd') || (ch.i && ch.k);
        const isPhpOrM3u8 = url.includes('.php') || url.includes('.m3u8');

        if (isMpd) {
            // DÙNG SHAKA CHO MPD DRM
            let drmConfig = { clearKeys: {} };
            if (ch.i && ch.k) {
                drmConfig.clearKeys[toHex(ch.i)] = toHex(ch.k);
            }
            await shakaPlayer.attach(video);
            shakaPlayer.configure({ drm: drmConfig });
            try { await shakaPlayer.load(ch.u); } catch(e) {}
        } 
        else if (isPhpOrM3u8) {
            // DÙNG TRÌNH PHÁT GỐC CHO LINK PHP/M3U8 CỦA KHÔI
            console.log("Đang dùng trình phát gốc cho:", ch.n);
            video.src = ch.u;
            video.play().catch(() => {
                // Nếu trình phát gốc kén quá thì mới dùng Hls.js làm dự phòng
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls();
                    hlsPlayer.loadSource(ch.u);
                    hlsPlayer.attachMedia(video);
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                }
            });
        }

        renderList(ch.u);
        if(window.innerWidth < 800) sidebar.classList.remove('open');
    }

    function renderTabs() {
        document.getElementById('tab-box').innerHTML = GROUP_ORDER.map(g => 
            `<button class="${curTab === g ? 'active' : ''}" onclick="setTab('${g}', this)">${g === 'ALL' ? 'TẤT CẢ' : g}</button>`
        ).join('');
    }

    function renderList(activeUrl = "") {
        const box = document.getElementById('list');
        box.innerHTML = "";
        FIXED_CHANNELS.forEach(ch => {
            if (curTab !== 'ALL' && ch.g !== curTab) return;
            const div = document.createElement('div');
            div.className = `item ${ch.u === activeUrl ? 'active' : ''}`;
            div.innerHTML = `<img src="${ch.l}" onerror="this.src='https://via.placeholder.com/50?text=TV'"><span>${ch.n}</span>`;
            div.onclick = () => play(ch);
            box.appendChild(div);
        });
    }

    function setTab(t, btn) { curTab = t; renderTabs(); renderList(); }

    init();
</script>
